<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jira 자동화 도구 | Antigravity</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --accent-primary: #0072ff;
            --accent-secondary: #00c6ff;
            --text-color: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --neon-blue: 0 0 20px rgba(0, 198, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', 'Outfit', sans-serif;
            word-break: keep-all;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 114, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 198, 255, 0.05) 0%, transparent 40%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        nav {
            width: 100%;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
            line-height: 1.2;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1.2rem;
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .project-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-size: 1rem;
            width: 100%;
            max-width: 300px;
            outline: none;
            transition: all 0.3s;
        }

        .project-input:focus {
            border-color: var(--accent-secondary);
            box-shadow: var(--neon-blue);
        }

        textarea {
            width: 100%;
            height: 300px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            color: var(--text-color);
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: all 0.3s;
        }

        textarea:focus {
            border-color: var(--accent-secondary);
            box-shadow: var(--neon-blue);
        }

        label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        button {
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            padding: 1.2rem 2.5rem;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            align-self: flex-end;
            margin-top: 1rem;
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.2);
        }

        button:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 114, 255, 0.4);
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            margin-top: 2rem;
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        .log-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 300px;
            overflow-y: auto;
        }

        .log-item {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            display: flex;
            gap: 1rem;
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .type-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .type-epic { background: #6554c0; color: white; }
        .type-story { background: #0052cc; color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

    </style>
</head>
<body>
    <nav>
        <div class="logo">JIRABOT.IO</div>
        <div style="color: var(--text-dim); font-size: 0.9rem;">인증됨</div>
    </nav>

    <main>
        <section class="hero">
            <h1>워크플로우의 자동화.</h1>
            <p>기획안 마크다운을 붙여넣기만 하면, 즉시 구조화된 지라(Jira) 이슈 트리로 자동 변환됩니다.</p>
        </section>

        <div class="glass-container">
            <div class="form-group">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label>프로젝트 키 (Project Key)</label>
                    <input type="text" id="projectKey" class="project-input" placeholder="예: S14P31A405" value="S14P31A405">
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label>마크다운 기획안</label>
                        <button id="exampleBtn" style="padding: 0.3rem 0.8rem; font-size: 0.8rem; border-radius: 6px; margin: 0; background: rgba(255,255,255,0.1); box-shadow: none;">예시 불러오기</button>
                    </div>
                    <textarea id="content" placeholder="여기에 마크다운 코드를 붙여넣으세요..."></textarea>
                </div>

                <button id="submitBtn">이슈 생성하기</button>
            </div>

            <div id="resultsArea" class="results">
                <label style="display: block; margin-bottom: 1rem;">실행 로그</label>
                <div id="logList" class="log-list">
                    <!-- Logs will appear here -->
                </div>
            </div>
        </div>

        <div class="glass-container" style="display: flex; flex-direction: column; gap: 1rem; margin-top: -1rem;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-size: 1.2rem; font-weight: 600;">🤖 AI 봇 웹훅 수신 로그 (GitLab MR)</h2>
                <button id="refreshLogsBtn" style="margin: 0; padding: 0.5rem 1rem; font-size: 0.9rem; border-radius: 8px;">새로고침</button>
            </div>
            <div id="webhookLogsArea" class="log-list" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(0, 198, 255, 0.2);">
                <div class="log-item" style="color: var(--text-dim); text-align: center;">새로고침을 눌러 최근 처리된 일들을 확인하세요.</div>
            </div>
        </div>
    </main>

    <script>
        const submitBtn = document.getElementById('submitBtn');
        const resultsArea = document.getElementById('resultsArea');
        const logList = document.getElementById('logList');

        submitBtn.addEventListener('click', async () => {
            const content = document.getElementById('content').value;
            const projectKey = document.getElementById('projectKey').value;

            if (!content) {
                alert('내용을 입력해 주세요!');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = '지라 이슈 생성 중...';
            resultsArea.style.display = 'block';
            logList.innerHTML = '<div class="log-item" style="color: var(--accent-secondary)">> Jira Cloud 연동 시작 중...</div>';

            try {
                const response = await fetch('/api/create-issues', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, project_key: projectKey })
                });

                let data;
                try {
                    const text = await response.text();
                    data = JSON.parse(text);
                } catch (e) {
                    throw new Error('서버 오류: 올바르지 않은 JSON 응답입니다. 환경 변수를 확인하세요.');
                }

                if (data.status === 'success') {
                    logList.innerHTML += '<div class="log-item" style="color: #4ade80">> 모든 이슈가 성공적으로 생성되었습니다.</div>';
                    data.created.forEach(issue => {
                        const div = document.createElement('div');
                        div.className = 'log-item';
                        div.innerHTML = `
                            <span class="type-tag type-${issue.type.toLowerCase()}">${issue.type}</span>
                            <span style="color: var(--accent-secondary)">${issue.key}</span>
                            <span style="color: var(--text-dim)">${issue.summary}</span>
                        `;
                        logList.appendChild(div);
                    });
                } else {
                    throw new Error(data.message || '이슈 생성에 실패했습니다.');
                }
            } catch (err) {
                logList.innerHTML += `<div class="log-item" style="color: #f87171">> 에러 발생: ${err.message}</div>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = '다시 생성하기';
            }
        });

        document.getElementById('exampleBtn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('content').value = `### **Epic 4. AI 기반 고객 응대 챗봇 구축 (Sprint 1)**

**스토리 4-1. 챗봇 기본 UI/UX 및 컴포넌트 설계**
- [FE] 챗봇 플로팅 버튼 및 대화창 팝업 컴포넌트 퍼블리싱
- [FE] 유저-챗봇 간 말풍선 애니메이션 구현
- [FE/BE] 챗봇 대화 기록 초기화 및 세션 유지 기획

**스토리 4-2. LLM 연동 및 응답 파이프라인 구축**
- [AI/BE] 사용자 의도(Intent) 파악용 프롬프트 및 API 연동
- [BE] 예외 처리(Fallback) 로직 개발`;
        });

        // Webhook logs refresh logic
        const refreshLogsBtn = document.getElementById('refreshLogsBtn');
        const webhookLogsArea = document.getElementById('webhookLogsArea');
        refreshLogsBtn.addEventListener('click', async () => {
            refreshLogsBtn.innerText = '불러오는 중...';
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                if (data.status === 'success') {
                    webhookLogsArea.innerHTML = '';
                    if (data.logs.length === 0) {
                        webhookLogsArea.innerHTML = '<div class="log-item" style="color: var(--text-dim);">현재 기록된 최근 로그가 없습니다.</div>';
                    } else {
                        data.logs.forEach(msg => {
                            const div = document.createElement('div');
                            div.className = 'log-item';
                            if (msg.includes('에러') || msg.includes('❌') || msg.includes('오류')) div.style.color = '#f87171';
                            else if (msg.includes('✅') || msg.includes('완료')) div.style.color = '#4ade80';
                            else div.style.color = 'var(--text-color)';
                            div.innerText = msg;
                            webhookLogsArea.appendChild(div);
                        });
                    }
                }
            } catch (err) {
                webhookLogsArea.innerHTML = `<div class="log-item" style="color: #f87171;">로그를 불러오지 못했습니다: ${err.message}</div>`;
            } finally {
                refreshLogsBtn.innerText = '새로고침';
            }
        });
        
        // Auto fetch on load
        refreshLogsBtn.click();
    </script>
</body>
</html>
